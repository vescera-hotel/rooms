kind = "web"
previewPath = "/"
title = "Luxury Hotel Rooms"
version = "1.0.0"
id = "artifacts/hotel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20087

[services.development]
run = "node serve.mjs"

[services.production]
publicDir = "artifacts/hotel/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20087"
